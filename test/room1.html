<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Slides</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* This container ensures the iframe stays responsive */
        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="iframe-container">


    <iframe 
        src="https://docs.google.com/presentation/d/e/2PACX-1vTNQL-EML67yUgWQ_Dmjm10GbnVxii6EJlfOm13xFJbWANyQwk06VokxjcAXgbZUa5YQ0UcUAhHHeC3/embed?rm=minimal" 
        style="width:100%; height:100%; border:none;"
        allow="clipboard-write; self; same-origin" 
        sandbox="allow-scripts allow-same-origin allow-forms allow-modals"
        importance="high">
    </iframe>


    </div>

</body>
</html>
