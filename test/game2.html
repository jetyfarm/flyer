<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 20px; }
  
  /* Container for the Iframe */
  #intro-container { display: flex; flex-direction: column; align-items: center; }
  iframe { border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 800px; height: 450px; }

  /* Hidden Game Section */
  #game-container { display: none; margin-top: 20px; }
  
  .slot-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
  .slot { width: 100px; height: 100px; border: 3px dashed #999; background: #fff; display: flex; justify-content: center; align-items: center; border-radius: 10px; }
  .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 50px; padding: 20px; border-top: 2px solid #ccc; }
  .draggable-img { width: 80px; height: 80px; cursor: grab; background: #3498db; color: white; display: flex; justify-content: center; align-items: center; border-radius: 5px; font-weight: bold; }

  .btn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 8px; margin: 20px; }
  .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; }
</style>
</head>
<body>

  <div id="intro-container">
    <h2>Welcome! Watch the instructions below:</h2>
    
    <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vQAbuEmS_-nf8otsQtsZ1abQdBf7NqUjQ5fwKzoLsrBVgH-lNJ0rdT5LUsjQKJNK1Ae5yxkV9zolJbH/pubembed?start=false&loop=false&delayms=3000&rm=minimal" frameborder="0" width="960" height="569" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>

    <button class="btn" onclick="startGame()">I'm Ready! Start the Game</button>
  </div>

  <div id="game-container">
    <h2>Drag the images into the correct slots!</h2>
    <div class="slot-container">
      <div id="slot1" class="slot" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="slot2" class="slot" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="slot3" class="slot" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <button class="btn" onclick="checkResult()">Check Answer</button>
    </div>

    <div class="gallery" id="gallery" ondrop="drop(event)" ondragover="allowDrop(event)">
      <div id="img1" class="draggable-img" draggable="true" ondragstart="drag(event)">1</div>
      <div id="img2" class="draggable-img" draggable="true" ondragstart="drag(event)">2</div>
      <div id="img3" class="draggable-img" draggable="true" ondragstart="drag(event)">3</div>
      </div>
  </div>

  <div id="win" class="overlay"><h1>🎉 YOU DID IT!</h1><button class="btn" onclick="location.reload()">Play Again</button></div>
  <div id="lose" class="overlay"><h1>❌ Not quite right.</h1><button class="btn" onclick="document.getElementById('lose').style.display='none'">Try Again</button></div>

<script>
  // Correct setup: Slot 1 needs Img 1, etc.
  const solutions = { "slot1": "img1", "slot2": "img2", "slot3": "img3" };

  function startGame() {
    document.getElementById('intro-container').style.display = 'none';
    document.getElementById('game-container').style.display = 'block';
  }

  function allowDrop(ev) { ev.preventDefault(); }
  function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }

  function drop(ev) {
    ev.preventDefault();
    const data = ev.dataTransfer.getData("text");
    const el = document.getElementById(data);
    
    if (ev.target.classList.contains('slot') && ev.target.children.length === 0) {
      ev.target.appendChild(el);
    } else if (ev.target.id === 'gallery') {
      ev.target.appendChild(el);
    }
  }

  function checkResult() {
    const s1 = document.getElementById('slot1').children[0]?.id;
    const s2 = document.getElementById('slot2').children[0]?.id;
    const s3 = document.getElementById('slot3').children[0]?.id;

    if (s1 === solutions.slot1 && s2 === solutions.slot2 && s3 === solutions.slot3) {
      document.getElementById('win').style.display = 'flex';
    } else {
      document.getElementById('lose').style.display = 'flex';
    }
  }
</script>
</body>
</html>
