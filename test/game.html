<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
  .slot-container { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }
  
  /* The 3 Slots at the top */
  .slot { width: 100px; height: 100px; border: 3px dashed #999; background: #fff; display: flex; justify-content: center; align-items: center; border-radius: 10px; }
  
  /* The Image Gallery at the bottom */
  .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 100px; padding: 20px; border-top: 2px solid #ccc; }
  
  .draggable-img { width: 80px; height: 80px; cursor: grab; background: #ddd; display: flex; justify-content: center; align-items: center; border-radius: 5px; font-weight: bold; font-size: 12px; }

  button { margin-top: 30px; padding: 10px 20px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }

  /* Overlay Screens */
  .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; justify-content: center; align-items: center; flex-direction: column; z-index: 100; }
</style>
</head>
<body>

  <h2>Drag the correct images to the slots!</h2>

  <div class="slot-container">
    <div id="slot1" class="slot" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <div id="slot2" class="slot" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <div id="slot3" class="slot" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <button onclick="checkResult()">Check Result</button>
  </div>

  <div class="gallery" id="gallery" ondrop="drop(event)" ondragover="allowDrop(event)">
    <div id="img1" class="draggable-img" draggable="true" ondragstart="drag(event)">Image 1</div>
    <div id="img2" class="draggable-img" draggable="true" ondragstart="drag(event)">Image 2</div>
    <div id="img3" class="draggable-img" draggable="true" ondragstart="drag(event)">Image 3</div>
    <div id="img4" class="draggable-img" draggable="true" ondragstart="drag(event)">Image 4</div>
    <div id="img5" class="draggable-img" draggable="true" ondragstart="drag(event)">Image 5</div>
    <div id="img6" class="draggable-img" draggable="true" ondragstart="drag(event)">Image 6</div>
    <div id="img7" class="draggable-img" draggable="true" ondragstart="drag(event)">Image 7</div>
    <div id="img8" class="draggable-img" draggable="true" ondragstart="drag(event)">Image 8</div>
    <div id="img9" class="draggable-img" draggable="true" ondragstart="drag(event)">Image 9</div>
    <div id="img10" class="draggable-img" draggable="true" ondragstart="drag(event)">Image 10</div>
  </div>

  <div id="win" class="overlay"><h1>🎉 Congratulations!</h1><button onclick="location.reload()">Play Again</button></div>
  <div id="lose" class="overlay"><h1>❌ Try Again!</h1><button onclick="closeOverlay()">Close</button></div>

<script>
  // DEFINE YOUR CORRECT ANSWERS HERE
  const correctAnswers = {
    "slot1": "img1", // Slot 1 needs Image 1
    "slot2": "img2", // Slot 2 needs Image 2
    "slot3": "img3"  // Slot 3 needs Image 3
  };

  function allowDrop(ev) {
    ev.preventDefault();
  }

  function drag(ev) {
    ev.dataTransfer.setData("text", ev.target.id);
  }

  function drop(ev) {
    ev.preventDefault();
    var data = ev.dataTransfer.getData("text");
    var draggedElement = document.getElementById(data);
    
    // Rule: If dropping into a slot, check if it's already full
    if (ev.target.classList.contains('slot')) {
        if (ev.target.children.length === 0) {
            ev.target.appendChild(draggedElement);
        } else {
            alert("This slot is full! Drag the current image out first.");
        }
    } 
    // Allow dragging back to the gallery
    else if (ev.target.id === 'gallery') {
        ev.target.appendChild(draggedElement);
    }
  }

  function checkResult() {
    let s1 = document.getElementById('slot1').children[0]?.id;
    let s2 = document.getElementById('slot2').children[0]?.id;
    let s3 = document.getElementById('slot3').children[0]?.id;

    if (s1 === correctAnswers.slot1 && s2 === correctAnswers.slot2 && s3 === correctAnswers.slot3) {
      document.getElementById('win').style.display = 'flex';
    } else {
      document.getElementById('lose').style.display = 'flex';
    }
  }

  function closeOverlay() {
    document.getElementById('lose').style.display = 'none';
  }
</script>
</body>
</html>
